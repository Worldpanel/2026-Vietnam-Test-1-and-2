<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldpanel Vietnam Assessment</title>
    <style>
        :root { --primary: #673ab7; --bg: #f3f0f9; --white: #ffffff; --text: #202124; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; user-select: none; }
        .header-bar { width: 100%; background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; box-sizing: border-box; }
        .stats { display: flex; gap: 20px; font-weight: 600; }
        .stat-item { background: #eee; padding: 5px 15px; border-radius: 20px; font-size: 14px; }
        .timer { color: var(--primary); font-size: 18px; font-weight: bold; }
        .container { width: 90%; max-width: 800px; margin: 40px auto; }
        .card { background: var(--white); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 40px; }
        .hidden { display: none; }
        .q-text { font-size: 18px; font-weight: 500; margin-bottom: 25px; line-height: 1.6; display: block; }
        .option-label { border: 1px solid #ddd; padding: 15px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; margin-bottom: 12px; transition: 0.2s; }
        .option-label:hover { background: #f6f0ff; border-color: var(--primary); }
        input[type="radio"] { margin-right: 15px; transform: scale(1.2); accent-color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f4f4f4; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 35px; border-radius: 5px; font-weight: 600; cursor: pointer; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="header-bar">
    <div class="stats">
        <div class="stat-item">Question: <span id="q-count">0</span>/45</div>
        <div class="stat-item">Violations: <span id="v-count">0</span></div>
    </div>
    <div id="timer" class="timer">45:00</div>
</div>

<div class="container">
    <div id="start-screen" class="card">
        <h1>Worldpanel – Vietnam Test</h1>
        <p>Numerical Aptitude & Data Interpretation (45 minutes)</p>
        <div style="background:#f9f9f9; padding:20px; border-radius:5px; margin:20px 0;">
            <strong>Instructions:</strong>
            <ul>
                <li>One question per page. You <b>cannot go back</b>.</li>
                <li>No tab switching, no copy/paste.</li>
                <li>The test auto-submits when time ends.</li>
            </ul>
        </div>
        <input type="email" id="email" placeholder="Email (required)" style="width:100%; padding:15px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
        <button class="btn" onclick="startTest()">Start Test</button>
    </div>

    <div id="test-screen" class="card hidden">
        <div id="data-context"></div>
        <span class="q-text" id="q-text"></span>
        <div id="options"></div>
        <div style="text-align:right; margin-top:30px;">
            <button class="btn" id="next-btn" onclick="nextQ()" disabled>Next Question</button>
        </div>
    </div>
</div>

<script>
    const TEST_1_DATA = [
        { q: "1. Which of the following fractions is less than one-third?", o: ["A. 22/63", "B. 4/11", "C. 15/46", "D. 33/98", "E. 102/103"] },
        { q: "2. When it is noon at prime meridian on the equator, what time is it at 75 degree north latitude on this meridian?", o: ["A. 12 noon", "B. 3 pm", "C. 5 pm", "D. 7 am", "E. Midnight"] },
        { q: "3. A carpenter needs four boards, each 2 metres 70 cm long. If wood is sold only by the metre, how many metres must he buy?", o: ["A. 9", "B. 10", "C. 11", "D. 12", "E. 13"] },
        { q: "4. A motorist travels 120 KM to his destination at 60 KM/hr and returns at 40 KM/hr. Average speed for the entire trip is:", o: ["A. 53 Km", "B. 50 Km", "C. 48 Km", "D. 43 Km", "E. 152 Km"] },
        { q: "5. A train covers distance D in H hours arriving two hours late. What rate would permit the train to arrive on schedule?", o: ["A. H2", "B. D / (H-2)", "C. (D/H) 2", "D. DH 2", "E. D / (H+2)"] },
        { q: "6. From a square measuring 6 cm, the largest circle is cut. Ratio of circle area to square area is closest to (Pi=3):", o: ["A. 4/5", "B. 2/3", "C. 3/5", "D. 1/2", "E. 3/4"] },
        { q: "7. If circle area (sq cm) equals circumference (cm), the diameter is:", o: ["A. 4 cm", "B. 2 cm", "C. 1 cm", "D. 11 cm", "E. none of these"] },
        { q: "8. 6L of 20% alcohol is mixed with 4L of 60% solution. The mixture strength is:", o: ["A. 80%", "B. 40%", "C. 36%", "D. 48%", "E. none"] },
        { q: "9. Pens bought at 35,000/dozen and sold at 3 for 10,000. Profit on 5 1/2 dozen is:", o: ["A. 25,000", "B. 27,500", "C. 28,500", "D. 32,500", "E. 3,000"] },
        { q: "10. Which is equal to 26 x 3.5?", o: ["A. (26x30)+(26x1/2)", "B. (26x3)+(6x1/2)", "C. (26x3 1/2)+(6x3)", "D. (26x3)+(26x1/2)+(6x3)", "E. (26x1/2)+(20x3)+(6x3)"] },
        { q: "11. Mrs. Iyer paid 10% less tax in 1981 than 1980, and 10% less in 1982 than 1981. Total % less than 1980:", o: ["A. 19%", "B. 20%", "C. 21%", "D. 81%", "E. 90%"] },
        { q: "12. Difference between 105,084 and 93,709 is:", o: ["A. 37,215", "B. 12,131", "C. 56,294", "D. 56,375", "E. 11,375"] },
        { q: "13. X to Y is 3.5 hrs at 60 mph. Return trip at 50 mph takes:", o: ["A. 2h 55m", "B. 3h 40m", "C. 4h 32m", "D. 4h 12m", "E. 4h 40m"] },
        { q: "14. Wage is 15,000/hr. 15% income tax, then 10% professional tax on remainder. Left with:", o: ["A. 12,750", "B. 9,750", "C. 14,125", "D. 13,500", "E. 11,475"] },
        { q: "15. Smallest quantity:", o: ["A. 4/5", "B. 7/9", "C. 0.76", "D. 5/7", "E. 9/11"] },
        { q: "16. Girl earns twice in Dec as other months. Dec part of year earnings:", o: ["A. 2/11", "B. 2/13", "C. 3/14", "D. 1/6", "E. 1/7"] },
        { q: "17. Wheel A (30cm) takes 240 revs. Wheel B (20cm) revs for same distance:", o: ["A. 120", "B. 160", "C. 360", "D. 420", "E. 450"] },
        { q: "18. If RX=RY and X != Y, R is:", o: ["A. 0", "B. 1", "C. X/Y", "D. Y/X", "E. XY"] },
        { q: "19. Smallest positive number divided by 3, 4, or 5 leaves remainder 2:", o: ["A. 22", "B. 42", "C. 122", "D. 62", "E. 182"] },
        { q: "20. Taxi: 20k first 0.25km, 5k per additional 0.25km. Cost for d km:", o: ["A. 20+5(4d-1)", "B. 20+5d", "C. 20+20d", "D. 20+4(d-1)", "E. 20+20(d-1)"] },
        { q: "21. 30% from Mekong, 10% of those from Can Tho. Can Tho total %:", o: ["A. 0.03", "B. 0.3", "C. 3", "D. 13", "E. 20"] },
        { q: "22. 9am to 2pm temp rose -14C to +36C. Temp at noon:", o: ["A. -4C", "B. +16C", "C. +6C", "D. +26C", "E. +31C"] },
        { q: "23. Ways to express 9 as sum of two different positive integers:", o: ["A. 4", "B. 3", "C. 5", "D. 6", "E. 7"] },
        { q: "24. Solve: 36 / (29 - 4/0.2) =", o: ["A. 4/3", "B. 2", "C. 4", "D. 9", "E. 18"] },
        { q: "25. Sum of 3 consecutive odd numbers always divisible by:", o: ["A. Only 4", "B. Only 2", "C. 1 and 2", "D. Only 1", "E. 2 and 4"] },
        { q: "26. 20% discount saves 15,000. Paid price:", o: ["A. 35,000", "B. 75,000", "C. 60,000", "D. 150,000", "E. 300,000"] },
        { q: "27. T kg snow in 1 sec. Kgs in M mins:", o: ["A. 60MT", "B. MT+60", "C. MT", "D. 60M/T", "E. MT/60"] },
        { q: "28. Same value as P/Q:", o: ["A. P2/Q2", "B. 3P/3Q", "C. 3P/4Q", "D. (1+P)/(1+Q)", "E. (P+3)/(Q+3)"] },
        { q: "29. Compare: A: (1/4)/(3/8) | B: 1", o: ["A. A > B", "B. B > A", "C. A = B", "D. Cannot tell"] },
        { q: "30. Compare: A: 0.25 | B: 1/4", o: ["A. A > B", "B. B > A", "C. A = B", "D. Cannot tell"] },
        { q: "31. Compare: A: 3 1/2 % | B: 35/1000", o: ["A. A > B", "B. B > A", "C. A = B", "D. Cannot tell"] },
        { q: "32. Compare: A: Posts for 144m fence (12m apart) | B: 12 posts", o: ["A. A > B", "B. B > A", "C. A = B", "D. Cannot tell"] },
        
        // TEST 2 (Q33 - Q45)
        { t: "CIVIL", q: "33. (1.1) Non-comp class percentage constantly increasing since 1902.", o: ["A. Correct", "B. Incorrect"] },
        { t: "CIVIL", q: "34. (1.2) Comp class percentage never below 55%.", o: ["A. Correct", "B. Incorrect"] },
        { t: "CIVIL", q: "35. (1.3) Labour class grew faster than non-comp 1926-1937.", o: ["A. Correct", "B. Incorrect"] },
        { t: "CIVIL", q: "36. (1.4) Avg Comp class (1922-37) > Avg Total employees (1902-22).", o: ["A. Correct", "B. Incorrect"] },
        { q: "37. (2.1) What part of all tax revenue comes from income taxes?", o: ["1/3", "1/4", "2/5", "1/2", "3/4"] },
        { q: "38. (2.2) % of fed income from individual income taxes?", o: ["0.0043%", "0.043%", "0.43%", "4.3%", "43%"] },
        { q: "39. (2.3) Of 1,000 VND, how much from non-income tax sources?", o: ["260", "310", "430", "570", "743"] },
        { q: "40. (3.1) Year of greatest TB case difference HCMC vs Country?", o: ["1969", "1972", "1980", "1985", "1990"] },
        { q: "41. (3.2) 1990 TB cases per 1000 in HCMC?", o: ["0.5", "5.0", "5.5", "50.0", "50.5"] },
        { q: "42. (3.3) Mekong Delta sharpest TB case rise:", o: ["1972-73", "1973-74", "1975-76", "1976-77", "1980-81"] },
        { q: "43. (4.1) Ratio of sales to earnings in 1980:", o: ["1/2", "2/1", "1/5", "5/1", "1/6"] },
        { q: "44. (4.2) % increase in earning 1984 to 1985:", o: ["2%", "6%", "10%", "12%", "20%"] },
        { q: "45. (4.3) If 'g' is 1980 earnings, 1985 earnings are:", o: ["2g", "g/2", "g+2", "2/g", "3g"] }
    ];

    const CIVIL_TABLE = `
        <table><tr><th>Year</th><th>Total</th><th>Comp</th><th>Labour</th><th>Non-Comp</th></tr>
        <tr><td>1902</td><td>34</td><td>20</td><td>12</td><td>2</td></tr><tr><td>1906</td><td>42</td><td>24</td><td>16</td><td>2</td></tr>
        <tr><td>1910</td><td>54</td><td>30</td><td>18</td><td>6</td></tr><tr><td>1914</td><td>55</td><td>31</td><td>18</td><td>6</td></tr>
        <tr><td>1918</td><td>53</td><td>31</td><td>16</td><td>6</td></tr><tr><td>1922</td><td>60</td><td>35</td><td>17</td><td>8</td></tr>
        <tr><td>1926</td><td>73</td><td>44</td><td>20</td><td>9</td></tr><tr><td>1930</td><td>90</td><td>52</td><td>26</td><td>12</td></tr>
        <tr><td>1933</td><td>90</td><td>50</td><td>25</td><td>15</td></tr><tr><td>1937</td><td>112</td><td>63</td><td>30</td><td>19</td></tr></table>`;

    let current = 0;
    let violations = 0;
    let time = 45 * 60;

    function startTest() {
        if (!document.getElementById('email').value.includes('@')) return alert("Valid email required");
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        load();
        setInterval(updateTimer, 1000);
    }

    function load() {
        const item = TEST_1_DATA[current];
        document.getElementById('q-count').innerText = current + 1;
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('data-context').innerHTML = item.t === 'CIVIL' ? CIVIL_TABLE : "";
        const optBox = document.getElementById('options');
        optBox.innerHTML = "";
        item.o.forEach(opt => {
            optBox.innerHTML += `<label class="option-label"><input type="radio" name="ans" onclick="document.getElementById('next-btn').disabled=false"> ${opt}</label>`;
        });
        document.getElementById('next-btn').disabled = true;
    }

    function nextQ() {
        if (current < TEST_1_DATA.length - 1) { current++; load(); }
        else { alert("Test completed successfully!"); }
    }

    function updateTimer() {
        time--;
        let m = Math.floor(time / 60), s = time % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (time <= 0) { alert("Time's up!"); location.reload(); }
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) { violations++; document.getElementById('v-count').innerText = violations; alert("Violation recorded!"); }
    });
</script>
</body>
</html>
